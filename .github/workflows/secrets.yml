name: Secrets Detection — Gitleaks

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout — full history
        uses: actions/checkout@v4
        with:
          # Fetch full git history so Gitleaks can scan all commits,
          # not just the diff. A secret committed 3 months ago and
          # "deleted" in a later commit is still in git history.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        id: gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Point to MedScribe custom config
          GITLEAKS_CONFIG: .gitleaks.toml
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: secrets

      # ── Hard gate — no warn-only mode for secrets ──────────────────
      # A detected secret must be rotated immediately regardless of
      # whether it was "deleted" from source. Rotation is mandatory
      # before any merge is permitted.
      - name: Evaluate secrets gate
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Secret detected in repository history."
          echo ""
          echo "REQUIRED ACTIONS:"
          echo "1. Identify the leaked credential in the Gitleaks output above."
          echo "2. Rotate the credential IMMEDIATELY in GCP Secret Manager / the issuing service."
          echo "3. Assume the credential is compromised — notify the security team."
          echo "4. Remove the secret from git history using 'git filter-repo' or BFG."
          echo "5. Force-push the cleaned history (requires security team approval)."
          echo ""
          echo "Do NOT merge until these steps are complete."
          exit 1

      - name: Comment on PR (secrets found)
        if: >
          steps.gitleaks.outcome == 'failure' &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 Secret Detected — Merge Blocked\n\nGitleaks found a potential secret in this PR's commit history.\n\n**This is a security incident.** Please:\n1. Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details\n2. Rotate the affected credential immediately\n3. Notify the security team at security@medscribe-r-us.fake\n4. Clean git history before re-requesting review\n\nDo not attempt to work around this gate.`
            })
